<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        body {
            font-family: Arial, Halvetica, sans-serif;
        }

        a {
            color: red;
        }

        a:visited {
            color: darkred;
        }

        a:hover {
            color: black;
            text-decoration: yellow;
        }

        a:active {
            color: yellow;
        }

        .especial {
            background-color: rgb(255, 140, 140);
        }

        .especial::before {
            content: '>> ';
            
        }

        .especial::after {
            content: ' <<';
            
        }
    </style>
</head>
<body>
    <h1>Personalizando links</h1>
    <ul>
        <li><a href="https://www.youtube.com/@kadakin" target="_blank" class="especial">Canal do Youtube</a></li>
        <li><a href="https://github.com/kadaki10/ESTUDOS-EM-HTML-e-CSS3" target="_blank">Meu repositorio em HTML5 E CSS3</a></li>
        <li><a href="https://www.cursoemvideo.com/" target="_blank">Site do Curso Em Video</a></li>
    </ul>
</body>
</html>
