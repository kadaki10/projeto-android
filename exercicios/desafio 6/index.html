    <h1>Tags em HTML</h1>
    <h4>Em HTML5, podemos inserir os elementos da lista a seguir. Passe o mouse sobre os termos para descobrir qual tag deverá utilizar em cada caso.</h4>
    <p title="Use a tag <p>"> &#9632 Paragrafos</p>
    <p title="Use a tag &lt;h1&gt;"> &#9632 Titulos</p>
    <p title="Use a tag &lt;img&gt;"> &#9632 Imagens</p>
    <p title="Use a tag &lt;abbr&gt;"> &#9632 Abreviações<abbr title="HyperText Markup Language"></abbr></p>
    <p title="Use a tag &lt;code&gt;"> &#9632 Código fonte</p>
    <p title="Use a tag &lt;ol&gt;"> &#9632 Lista numerada</p>
    <p title="Use a tag &lt;ul&gt;"> &#9632 Lista com demarcadores</p>
